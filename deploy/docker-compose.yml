services:
  tori:
    image: ghcr.io/thobiasn/tori-cli:latest
    restart: unless-stopped
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /run/tori:/run/tori
      - tori-data:/var/lib/tori
    environment:
      TORI_CONFIG: |
        [storage]
        path = "/var/lib/tori/tori.db"
        retention_days = 7

        [socket]
        path = "/run/tori/tori.sock"
        mode = "0666"

        [host]
        proc = "/host/proc"
        sys = "/host/sys"

        [docker]
        socket = "/var/run/docker.sock"

        [collect]
        interval = "10s"

        [alerts.container_down]
        condition = "container.state == 'exited'"
        for = "30s"
        # cooldown = "5m"
        # notify_cooldown = "5m"
        severity = "critical"
        actions = ["notify"]

        [alerts.high_cpu]
        condition = "host.cpu_percent > 90"
        for = "2m"
        # cooldown = "5m"
        # notify_cooldown = "5m"
        severity = "warning"
        actions = ["notify"]

        [alerts.high_memory]
        condition = "host.memory_percent > 85"
        for = "1m"
        severity = "warning"
        actions = ["notify"]

        [alerts.disk_space]
        condition = "host.disk_percent > 90"
        for = "0s"
        severity = "critical"
        actions = ["notify"]

        # [alerts.high_load]
        # condition = "host.load1 > 4"     # tune threshold to your CPU count
        # for = "5m"
        # severity = "warning"
        # actions = ["notify"]

        [alerts.high_swap]
        condition = "host.swap_percent > 80"
        for = "2m"
        severity = "warning"
        actions = ["notify"]

        [alerts.container_memory]
        condition = "container.memory_percent > 90"
        for = "1m"
        severity = "warning"
        actions = ["notify"]

        [alerts.unhealthy]
        condition = "container.health == 'unhealthy'"
        for = "30s"
        resolve_for = "30s"
        severity = "critical"
        actions = ["notify"]

        [alerts.restart_loop]
        condition = "container.restart_count > 5"
        severity = "critical"
        actions = ["notify"]

        [alerts.bad_exit]
        condition = "container.exit_code != 0"
        for = "0s"
        severity = "warning"
        actions = ["notify"]

        # [alerts.error_spike]
        # condition = "log.count > 10"
        # match = "error"                    # substring match (case-insensitive)
        # window = "5m"
        # severity = "warning"
        # actions = ["notify"]

        # [alerts.oom_kills]
        # condition = "log.count > 0"
        # match = "\\bOOM\\b|\\bout of memory\\b"        # regex match
        # match_regex = true
        # window = "10m"
        # severity = "critical"
        # actions = ["notify"]

        # Notification examples

        # [notify.email]
        # enabled = true
        # smtp_host = "smtp.example.com"
        # smtp_port = 587
        # tls = "starttls"
        # username = "alerts@example.com"
        # password = "app-password"
        # from = "alerts@example.com"
        # to = ["you@example.com"]

        # Webhooks (Discord, Slack, etc.)
        # [[notify.webhooks]]
        # enabled = true
        # url = "https://discord.com/api/webhooks/YOUR/WEBHOOK"
        # template = '{"content":"**{{.Subject}}**\n{{.Body}}"}'

        # [[notify.webhooks]]
        # enabled = true
        # url = "https://hooks.slack.com/services/YOUR/WEBHOOK"

        # [[notify.webhooks]]
        # enabled = true
        # url = "https://your-service.example.com/alerts"
        # [notify.webhooks.headers]
        # Authorization = "Bearer YOUR_TOKEN"

volumes:
  tori-data:
