name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -v ./...

      - name: Coverage (core packages)
        run: go test -coverprofile=coverage.out ./internal/agent/... ./internal/protocol/...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}
